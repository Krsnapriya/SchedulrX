name: schedulrx
version: 2.2.0
description: >
  Multi-participant meeting scheduler under TRUE partial observability.
  Availability is hidden until agents actively read participant profiles.
  Novel mechanics: Trust Budget (diminishing query returns), Cascading
  Availability (scheduling permanently strips overlapping slots), and an
  Adversarial Participant in hard mode (60% blind-schedule rejection).
  Evaluates planning, information gathering, and constraint satisfaction.

tags:
  - openenv
  - scheduling
  - pomdp
  - partial-observability
  - trust-budget
  - cascading-availability

baseline_scores:
  easy: 0.89
  medium: 0.67
  hard: 0.41
  model: nvidia/nemotron-3-super-120b-a12b

reproducibility:
  deterministic: true
  seeds:
    easy: 42
    medium: 137
    hard: 999

grader:
  formula: "easy: completion*0.85 + efficiency*0.15 | medium: completion*0.55 + constraints*0.35 + efficiency*0.10 | hard: completion*0.40 + constraints*0.35 + adversarial*0.15 + efficiency*0.10"
  range: [0.0, 1.0]

tasks:
  - name: easy
    description: >
      1 meeting, 2 participants. Trust budget: 2 reads. Focus on execution.
    max_steps: 30
    grader: env:programmatic_grade
    expected_greedy_score: 0.40
    expected_llm_score: 0.89

  - name: medium
    description: >
      3 meetings, 4 participants. Timezone conflicts + Cascading slots.
      Trust budget: 4 reads.
    max_steps: 30
    grader: env:programmatic_grade
    expected_greedy_score: 0.30
    expected_llm_score: 0.67

  - name: hard
    description: >
      3 meetings, 5 participants. All mechanics active: Adversarial p5 (Eve).
      Scheduling Eve blind = 60% rejection. Trust budget: 5 reads.
    max_steps: 40
    grader: env:programmatic_grade
    expected_greedy_score: 0.20
    expected_llm_score: 0.41



action_space:
  type: object
  required:
    - action_type
  properties:
    action_type:
      type: string
      enum:
        - read_profile
        - schedule_meeting
        - accept_proposal
        - reschedule_meeting
      description: >
        read_profile: reveals a participant's availability and constraints.
        schedule_meeting: attempt to schedule a meeting at a given time.
        accept_proposal: accept a counter-proposal offered by a participant.
        reschedule_meeting: reschedule a cancelled meeting.
    participant_id:
      type: string
      description: "Required for read_profile"
    meeting_id:
      type: string
      description: "Required for schedule_meeting and reschedule_meeting"
    proposed_time:
      type: string
      format: date-time
      description: "ISO 8601 datetime. Required for schedule_meeting and reschedule_meeting"
    proposal_id:
      type: string
      description: "ID from counter_proposals list. Required for accept_proposal"

observation_space:
  type: object
  properties:
    current_time:
      type: string
      format: date-time
    participants:
      type: array
      description: >
        Each participant has id, name, timezone, and availability.
        availability is null until read_profile is called for that participant.
    requests:
      type: array
      description: >
        All meeting requests including depends_on (dependency) and
        deadline_hours fields.
    scheduled_meetings:
      type: array
      description: Successfully scheduled meetings
    cancelled_meetings:
      type: array
      description: IDs of meetings cancelled by the environment (hard task)
    profiles_read:
      type: object
      description: >
        Discovered hidden profiles. Only populated after read_profile is called.
        Contains preferred_times, avoid_days, fatigue_penalty, soft_constraints.
    counter_proposals:
      type: array
      description: >
        Active counter-proposals from participants after scheduling failures.
        Each has proposal_id, meeting_id, proposed_time, reason.
        Accept with accept_proposal action.
    step_count:
      type: integer

reward_range: [-1.0, 1.0]

reward_function: |
  read_profile (new):              +0.25  + progress_bonus
  read_profile (repeat/invalid):   -0.10 or -0.15
  schedule_meeting (valid):        +0.45  + constraint_delta + progress_bonus
  schedule_meeting (valid, no profile read):  -0.40 (hard block)
  schedule_meeting (dependency unmet):        -0.50
  schedule_meeting (invalid slot):            -0.70
  schedule_meeting (invalid, counter-offered):-0.25  (softer, proposal available)
  schedule_meeting (duplicate):               -0.80
  accept_proposal (valid):         +0.55  + progress_bonus (negotiation bonus)
  reschedule_meeting (success):    +0.50  + progress_bonus
  reschedule_meeting (failure):    -0.50
  unknown action_type:             -0.05
  progress_bonus = min(n_scheduled/n_active, 1.0) × 0.20
  All rewards clipped to [-1.0, 1.0]

reward_decomposition:
  components:
    - name: conflict_free
      weight: 0.35
      description: Fraction of participants available at proposed slot
    - name: preference_alignment
      weight: 0.25
      description: Match between slot time and participant preferred_times
    - name: timezone_fairness
      weight: 0.15
      description: Fraction of participants in reasonable local hours (6am-9pm)
    - name: efficiency
      weight: 0.10
      description: Bonus for solving earlier in the episode
    - name: soft_constraint_penalty
      weight: 0.15
      description: Penalties from hidden profile constraints (adversarial traps)

grader: |
  score = (completion × 0.35)
        + (preference_alignment × 0.25)
        + (priority_order × 0.20)
        + (step_efficiency × 0.20)

  completion: meetings scheduled / active meetings (non-cancelled)
  preference_alignment: mean score across meetings, 1.0 if time matches
    participant's preferred_times, 0.3 otherwise, 0.5 if profile unread
  priority_order: 1 - (scheduling order inversions / max possible inversions)
  step_efficiency: max(0, 1 - step_count/max_steps), only if fully completed

grader_output_schema:
  score: float
  capabilities:
    constraint_satisfaction: float
    soft_constraint_reasoning: float
    adaptability: float
    efficiency: float
  failure_modes: list[str]
  trajectory_summary:
    steps: int
    replans: int
    conflicts_detected: bool
    profiles_explored: int

baseline:
  type: heuristic
  fallback: true
  endpoint: /baseline

endpoints:
  reset:    "POST /reset?task_name=easy|medium|hard|adversarial&seed=42"
  step:     "POST /step"
  state:    "GET  /state?session_id=<id>"
  tasks:    "GET  /tasks"
  grader:   "GET  /grader?session_id=<id>"
  baseline: "POST /baseline?task_name=easy|medium|hard"
  health:   "GET  /health"
